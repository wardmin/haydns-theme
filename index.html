<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Haydn's Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0e07;
    background-image: linear-gradient(160deg, #1a0e07 0%, #2e1a0e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'IM Fell English', Georgia, serif;
  }

  .sheet {
    background: linear-gradient(135deg, #f5eed8 0%, #ede0be 100%);
    border-radius: 4px;
    max-width: 540px;
    width: 100%;
    padding: 40px 44px 36px;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.5),
      0 24px 64px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.5);
    border: 1px solid rgba(201,168,76,0.4);
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 26px; }

  .composer {
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #7a5c2e;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-style: italic;
    color: #1a1208;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #9a7a4e;
  }

  /* ── Lyric box ── */
  .lyric-box {
    background: #e8dcc0;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 2px;
    padding: 14px;
    margin-bottom: 18px;
    text-align: center;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #lyricText {
    font-size: 22px;
    font-style: italic;
    color: #1a1208;
    transition: opacity .15s;
  }

  #lyricText.idle {
    font-size: 13px;
    font-style: normal;
    color: #9a7a4e;
    letter-spacing: .1em;
  }

  /* ── Progress ── */
  .progress-track {
    width: 100%;
    height: 4px;
    background: #ddd0aa;
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  #progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7a5c2e, #c9a84c);
    border-radius: 2px;
    transition: width .1s linear;
  }

  /* ── Tempo ── */
  .tempo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .tempo-label {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #7a5c2e;
  }

  #tempoSlider {
    -webkit-appearance: none;
    width: 130px;
    height: 4px;
    background: #ddd0aa;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #tempoSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 15px; height: 15px;
    background: #c9a84c;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  #tempoSlider::-moz-range-thumb {
    width: 15px; height: 15px;
    background: #c9a84c;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }

  #tempoVal {
    font-size: 12px;
    color: #7a5c2e;
    min-width: 58px;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
  }

  button {
    font-family: 'IM Fell English', Georgia, serif;
    cursor: pointer;
    border-radius: 2px;
    transition: all .15s;
  }

  #playBtn {
    background: #1a1208;
    color: #c9a84c;
    border: 1.5px solid #c9a84c;
    padding: 11px 34px;
    font-size: 15px;
    letter-spacing: .08em;
    min-width: 136px;
  }

  #playBtn:hover { background: #2e1a0e; box-shadow: 0 0 16px rgba(201,168,76,0.25); }
  #playBtn.playing { background: #6b1212; color: #fcc; border-color: #c44; }

  #resetBtn {
    background: transparent;
    color: #7a5c2e;
    border: 1px solid rgba(122,92,46,0.4);
    padding: 11px 18px;
    font-size: 13px;
    display: none;
  }

  #resetBtn:hover { background: #e8dcc0; color: #1a1208; }

  /* ── Piano ── */
  .piano-section { text-align: center; }

  .piano-label {
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #9a7a4e;
    margin-bottom: 10px;
  }

  .keys {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .key {
    width: 56px;
    height: 108px;
    background: linear-gradient(180deg, #faf6ec 0%, #e8e0d0 100%);
    border: 1px solid #bbb;
    border-radius: 0 0 7px 7px;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 9px;
    font-size: 13px;
    font-weight: bold;
    font-family: 'Playfair Display', serif;
    color: #bbb;
    box-shadow: 0 4px 8px rgba(0,0,0,0.18);
    transition: all .07s;
    user-select: none;
    -webkit-user-select: none;
  }

  .key:hover {
    background: linear-gradient(180deg, #fffef5 0%, #f0e8d8 100%);
  }

  .key.lit {
    background: linear-gradient(180deg, #fff9a0 0%, #f5d800 80%);
    border-color: #c9a84c;
    color: #7a5c2e;
    box-shadow: 0 0 16px rgba(201,168,76,0.55), 0 4px 8px rgba(0,0,0,0.18);
    transform: scaleY(0.97);
  }

  .key.warm {
    background: linear-gradient(180deg, #fdf5d0 0%, #f0e4a0 100%);
    color: #9a7a4e;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    font-size: 10px;
    color: #9a7a4e;
    margin-top: 18px;
    letter-spacing: .1em;
  }
</style>
</head>
<body>
<div class="sheet">

  <div class="header">
    <div class="composer">Franz Joseph Haydn &nbsp;·&nbsp; 1732–1809, Austria</div>
    <h1>Mr. Haydn's Theme</h1>
    <div class="subtitle">G 5-Finger Scale &nbsp;·&nbsp; 3/4 Time &nbsp;·&nbsp; Faber Piano Adventures</div>
  </div>

  <div class="lyric-box">
    <span id="lyricText" class="idle">Press Play to begin…</span>
  </div>

  <div class="progress-track">
    <div id="progressBar"></div>
  </div>

  <div class="tempo-row">
    <span class="tempo-label">Tempo</span>
    <input type="range" id="tempoSlider" min="50" max="160" value="96">
    <span id="tempoVal">♩= 96</span>
  </div>

  <div class="btn-row">
    <button id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button id="resetBtn" onclick="resetPlayer()">↺ Reset</button>
  </div>

  <div class="piano-section">
    <div class="piano-label">Tap a key &nbsp;·&nbsp; G · A · B · C · D</div>
    <div class="keys" id="keys"></div>
  </div>

  <div class="footer">✦ From Symphony No. 100, Finale &nbsp;·&nbsp; arranged for piano</div>
</div>

<script>
// ── Note frequencies ──────────────────────────────────────────────
const FREQ = { G4:392.00, A4:440.00, B4:493.88, C5:523.25, D5:587.33 };

// ── Melody ───────────────────────────────────────────────────────
// dur is in quarter-note beats (3/4 time)
const MELODY = [
  // Verse 1
  {n:'G4',d:1,w:'My'},    {n:'G4',d:1,w:'dear'}, {n:'A4',d:1,w:'Mis-'},
  {n:'B4',d:1,w:'-ter'},  {n:'A4',d:1,w:'Hay-'}, {n:'G4',d:1,w:'-dn,'},
  {n:'D5',d:1,w:'your'},  {n:'D5',d:1,w:'wig'},  {n:'D5',d:1,w:'is'},
  {n:'D5',d:1.5,w:'quite'},{n:'C5',d:0.5,w:''},   {n:'B4',d:2,w:'fun.'},
  {n:'D5',d:1,w:'Could'}, {n:'D5',d:1,w:'you'},  {n:'C5',d:1,w:'tell'},
  {n:'B4',d:1,w:'me'},    {n:'C5',d:1,w:'where'},{n:'B4',d:1,w:'I'},
  {n:'A4',d:1,w:'could'}, {n:'B4',d:3,w:'buy'},  {n:'G4',d:3,w:'one?'},
  // Verse 2 (repeat)
  {n:'G4',d:1,w:'My'},    {n:'G4',d:1,w:'dear'}, {n:'A4',d:1,w:'Mis-'},
  {n:'B4',d:1,w:'-ter'},  {n:'A4',d:1,w:'Hay-'}, {n:'G4',d:1,w:'-dn,'},
  {n:'D5',d:1,w:'your'},  {n:'D5',d:1,w:'wig'},  {n:'D5',d:1,w:'is'},
  {n:'D5',d:1.5,w:'quite'},{n:'C5',d:0.5,w:''},   {n:'B4',d:2,w:'fun.'},
  {n:'D5',d:1,w:'When'},  {n:'D5',d:1,w:'I'},    {n:'C5',d:1,w:'play'},
  {n:'B4',d:1,w:'this'},  {n:'C5',d:1,w:'song,'},{n:'B4',d:1,w:'should'},
  {n:'A4',d:1,w:'I'},     {n:'B4',d:3,w:'wear'}, {n:'G4',d:3,w:'one?'},
];

const SCALE_KEYS = ['G4','A4','B4','C5','D5'];

// ── Audio ─────────────────────────────────────────────────────────
let actx = null;

function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}

function playTone(freq, when, dur, vol) {
  vol = vol || 0.38;
  const ctx = getCtx();

  // Primary oscillator (triangle = piano-like warmth)
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, when);
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(vol, when + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.9);
  osc.start(when);
  osc.stop(when + dur + 0.05);

  // Octave overtone for shimmer
  const osc2  = ctx.createOscillator();
  const gain2 = ctx.createGain();
  osc2.connect(gain2);
  gain2.connect(ctx.destination);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.001, when);
  gain2.gain.setValueAtTime(vol * 0.1, when);
  gain2.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.6);
  osc2.start(when);
  osc2.stop(when + dur);
}

// ── Playback state ────────────────────────────────────────────────
let playing    = false;
let timers     = [];
let rafId      = null;
let playStart  = 0;
let totalSecs  = 0;

function getBeat() { return 60 / parseInt(document.getElementById('tempoSlider').value); }

function togglePlay() {
  if (playing) { stopAll(); } else { startPlay(); }
}

function startPlay() {
  const ctx  = getCtx();
  if (ctx.state === 'suspended') ctx.resume();

  playing = true;
  document.getElementById('playBtn').textContent = '⏹ Stop';
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('tempoSlider').disabled = true;

  const beat = getBeat();
  let when   = ctx.currentTime + 0.1;
  playStart  = when;
  totalSecs  = MELODY.reduce((s, n) => s + n.d * beat, 0);

  MELODY.forEach(function(item, i) {
    const dur = item.d * beat;
    playTone(FREQ[item.n], when, dur);

    const delay = Math.max(0, (when - ctx.currentTime) * 1000);
    timers.push(setTimeout(function() {
      flashKey(item.n, Math.round(dur * 850));
      if (item.w) showLyric(item.w);
    }, delay));

    when += dur;
  });

  // End callback
  const endMs = Math.max(0, (when - ctx.currentTime) * 1000);
  timers.push(setTimeout(function() {
    playing = false;
    document.getElementById('playBtn').textContent = '▶ Play';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('resetBtn').style.display = 'inline-block';
    document.getElementById('progressBar').style.width = '100%';
    showLyric('✦ Fine ✦');
  }, endMs));

  // RAF progress ticker
  function tick() {
    const pct = Math.min(100, ((ctx.currentTime - playStart) / totalSecs) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    if (pct < 100 && playing) rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

function stopAll() {
  timers.forEach(clearTimeout);
  timers = [];
  cancelAnimationFrame(rafId);
  playing = false;
}

function resetPlayer() {
  stopAll();
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('tempoSlider').disabled = false;
  const lt = document.getElementById('lyricText');
  lt.textContent = 'Press Play to begin…';
  lt.className = 'idle';
  document.querySelectorAll('.key').forEach(function(k) {
    k.classList.remove('lit','warm');
  });
}

// ── Lyric helper ──────────────────────────────────────────────────
function showLyric(word) {
  const el = document.getElementById('lyricText');
  el.className = '';
  el.style.opacity = '0';
  setTimeout(function() {
    el.textContent = word;
    el.style.opacity = '1';
  }, 80);
}

// ── Key helpers ───────────────────────────────────────────────────
function flashKey(note, ms) {
  const el = document.getElementById('key-' + note);
  if (!el) return;
  el.classList.add('lit');
  el.classList.remove('warm');
  setTimeout(function() {
    el.classList.remove('lit');
    el.classList.add('warm');
  }, ms);
}

function tapKey(note) {
  const ctx = getCtx();
  if (ctx.state === 'suspended') ctx.resume();
  playTone(FREQ[note], ctx.currentTime, 0.55);
  flashKey(note, 400);
}

// ── Build piano ───────────────────────────────────────────────────
(function buildKeys() {
  const container = document.getElementById('keys');
  SCALE_KEYS.forEach(function(note) {
    const label = note.replace(/\d/, '');
    const div = document.createElement('div');
    div.className = 'key';
    div.id = 'key-' + note;
    div.textContent = label;
    div.addEventListener('click', function() { tapKey(note); });
    // Touch support
    div.addEventListener('touchstart', function(e) {
      e.preventDefault();
      tapKey(note);
    }, { passive: false });
    container.appendChild(div);
  });
})();

// ── Tempo slider ──────────────────────────────────────────────────
document.getElementById('tempoSlider').addEventListener('input', function() {
  document.getElementById('tempoVal').textContent = '♩= ' + this.value;
});
</script>
</body>
</html>
