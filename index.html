<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Haydn's Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(160deg, #1a0e07 0%, #2e1a0e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'IM Fell English', Georgia, serif;
  }

  .sheet {
    background: linear-gradient(135deg, #f5eed8 0%, #ede0be 100%);
    border-radius: 4px;
    max-width: 520px;
    width: 100%;
    padding: 40px 44px 36px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.5), 0 24px 64px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.5);
    border: 1px solid rgba(201,168,76,0.4);
  }

  .header { text-align: center; margin-bottom: 26px; }
  .composer { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: #7a5c2e; margin-bottom: 6px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-style: italic; color: #1a1208; line-height: 1.1; margin-bottom: 4px; }
  .subtitle { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #9a7a4e; }

  .lyric-box {
    background: #e8dcc0;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 2px;
    padding: 14px;
    margin-bottom: 18px;
    text-align: center;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lyric-text { font-size: 22px; font-style: italic; color: #1a1208; transition: opacity .15s; }
  .lyric-text.idle { font-size: 13px; font-style: normal; color: #9a7a4e; letter-spacing: .1em; }

  .progress-track { width: 100%; height: 4px; background: #ddd0aa; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7a5c2e, #c9a84c); border-radius: 2px; transition: width .1s linear; }

  .tempo-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .tempo-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #7a5c2e; }

  .tempo-slider { -webkit-appearance: none; width: 130px; height: 4px; background: #ddd0aa; border-radius: 2px; outline: none; cursor: pointer; }
  .tempo-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #c9a84c; border-radius: 50%; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .tempo-slider::-moz-range-thumb { width: 15px; height: 15px; background: #c9a84c; border-radius: 50%; border: none; cursor: pointer; }
  .tempo-val { font-size: 12px; color: #7a5c2e; min-width: 58px; font-family: 'IM Fell English', Georgia, serif; }

  .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }

  .btn-play {
    background: #1a1208; color: #c9a84c; border: 1.5px solid #c9a84c;
    padding: 11px 34px; font-size: 15px; font-family: 'IM Fell English', Georgia, serif;
    letter-spacing: .08em; border-radius: 2px; cursor: pointer; min-width: 136px; transition: all .15s;
  }
  .btn-play:hover { background: #2e1a0e; box-shadow: 0 0 16px rgba(201,168,76,0.25); }
  .btn-play.playing { background: #6b1212; color: #fcc; border-color: #c44; }

  .btn-reset {
    background: transparent; color: #7a5c2e; border: 1px solid rgba(122,92,46,0.4);
    padding: 11px 18px; font-size: 13px; font-family: 'IM Fell English', Georgia, serif;
    border-radius: 2px; cursor: pointer; transition: all .15s;
  }
  .btn-reset:hover { background: #e8dcc0; color: #1a1208; }

  .piano-section { text-align: center; }
  .piano-label { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #9a7a4e; margin-bottom: 10px; }
  .keys { display: flex; gap: 5px; justify-content: center; }

  .key {
    width: 56px; height: 108px;
    background: linear-gradient(180deg, #faf6ec 0%, #e8e0d0 100%);
    border: 1px solid #bbb; border-radius: 0 0 7px 7px; cursor: pointer;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 9px;
    font-size: 13px; font-weight: bold; font-family: 'Playfair Display', serif; color: #bbb;
    box-shadow: 0 4px 8px rgba(0,0,0,0.18); transition: all .07s;
    user-select: none; -webkit-user-select: none;
  }
  .key:hover { background: linear-gradient(180deg, #fffef5 0%, #f0e8d8 100%); }
  .key.lit {
    background: linear-gradient(180deg, #fff9a0 0%, #f5d800 80%);
    border-color: #c9a84c; color: #7a5c2e;
    box-shadow: 0 0 16px rgba(201,168,76,0.55), 0 4px 8px rgba(0,0,0,0.18);
    transform: scaleY(0.97);
  }
  .key.warm { background: linear-gradient(180deg, #fdf5d0 0%, #f0e4a0 100%); color: #9a7a4e; }

  .footer { text-align: center; font-size: 10px; color: #9a7a4e; margin-top: 18px; letter-spacing: .1em; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const FREQ = { G4:392.00, A4:440.00, B4:493.88, C5:523.25, D5:587.33 };

const MELODY = [
  {n:'G4',d:1,w:'My'},     {n:'G4',d:1,w:'dear'},  {n:'A4',d:1,w:'Mis-'},
  {n:'B4',d:1,w:'-ter'},   {n:'A4',d:1,w:'Hay-'},  {n:'G4',d:1,w:'-dn,'},
  {n:'D5',d:1,w:'your'},   {n:'D5',d:1,w:'wig'},   {n:'D5',d:1,w:'is'},
  {n:'D5',d:1.5,w:'quite'},{n:'C5',d:0.5,w:''},    {n:'B4',d:2,w:'fun.'},
  {n:'D5',d:1,w:'Could'},  {n:'D5',d:1,w:'you'},   {n:'C5',d:1,w:'tell'},
  {n:'B4',d:1,w:'me'},     {n:'C5',d:1,w:'where'}, {n:'B4',d:1,w:'I'},
  {n:'A4',d:1,w:'could'},  {n:'B4',d:3,w:'buy'},   {n:'G4',d:3,w:'one?'},
  {n:'G4',d:1,w:'My'},     {n:'G4',d:1,w:'dear'},  {n:'A4',d:1,w:'Mis-'},
  {n:'B4',d:1,w:'-ter'},   {n:'A4',d:1,w:'Hay-'},  {n:'G4',d:1,w:'-dn,'},
  {n:'D5',d:1,w:'your'},   {n:'D5',d:1,w:'wig'},   {n:'D5',d:1,w:'is'},
  {n:'D5',d:1.5,w:'quite'},{n:'C5',d:0.5,w:''},    {n:'B4',d:2,w:'fun.'},
  {n:'D5',d:1,w:'When'},   {n:'D5',d:1,w:'I'},     {n:'C5',d:1,w:'play'},
  {n:'B4',d:1,w:'this'},   {n:'C5',d:1,w:'song,'}, {n:'B4',d:1,w:'should'},
  {n:'A4',d:1,w:'I'},      {n:'B4',d:3,w:'wear'},  {n:'G4',d:3,w:'one?'},
];

const SCALE_KEYS = ['G4','A4','B4','C5','D5'];

function playTone(ctx, freq, when, dur, vol = 0.38) {
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, when);
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(vol, when + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.9);
  osc.start(when); osc.stop(when + dur + 0.05);

  const osc2 = ctx.createOscillator(), g2 = ctx.createGain();
  osc2.connect(g2); g2.connect(ctx.destination);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.001, when);
  g2.gain.setValueAtTime(vol * 0.1, when);
  g2.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.6);
  osc2.start(when); osc2.stop(when + dur);
}

function HaydnPlayer() {
  const [isPlaying, setIsPlaying]   = useState(false);
  const [activeNote, setActiveNote] = useState(null);
  const [warmNotes, setWarmNotes]   = useState(new Set());
  const [lyric, setLyric]           = useState('');
  const [progress, setProgress]     = useState(0);
  const [tempo, setTempo]           = useState(96);
  const [done, setDone]             = useState(false);

  const ctxRef    = useRef(null);
  const timersRef = useRef([]);
  const rafRef    = useRef(null);

  const getCtx = () => {
    if (!ctxRef.current)
      ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctxRef.current;
  };

  const clearAll = useCallback(() => {
    timersRef.current.forEach(clearTimeout);
    timersRef.current = [];
    cancelAnimationFrame(rafRef.current);
  }, []);

  const reset = useCallback(() => {
    clearAll();
    setIsPlaying(false); setActiveNote(null); setWarmNotes(new Set());
    setLyric(''); setProgress(0); setDone(false);
  }, [clearAll]);

  const startPlay = useCallback(() => {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    setIsPlaying(true); setDone(false); setWarmNotes(new Set()); setProgress(0);

    const beat  = 60 / tempo;
    let when    = ctx.currentTime + 0.1;
    const start = when;
    const total = MELODY.reduce((s, n) => s + n.d * beat, 0);

    MELODY.forEach(item => {
      const dur   = item.d * beat;
      playTone(ctx, FREQ[item.n], when, dur);
      const delay = Math.max(0, (when - ctx.currentTime) * 1000);
      const litMs = Math.round(dur * 850);
      timersRef.current.push(setTimeout(() => {
        setActiveNote(item.n);
        setWarmNotes(prev => new Set([...prev, item.n]));
        if (item.w) setLyric(item.w);
        setTimeout(() => setActiveNote(null), litMs);
      }, delay));
      when += dur;
    });

    timersRef.current.push(setTimeout(() => {
      setIsPlaying(false); setActiveNote(null);
      setLyric('✦ Fine ✦'); setProgress(100); setDone(true);
    }, Math.max(0, (when - ctx.currentTime) * 1000)));

    const tick = () => {
      const pct = Math.min(100, ((ctx.currentTime - start) / total) * 100);
      setProgress(pct);
      if (pct < 100) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
  }, [tempo]);

  useEffect(() => () => clearAll(), [clearAll]);

  const tapKey = note => {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    playTone(ctx, FREQ[note], ctx.currentTime, 0.55);
    setActiveNote(note);
    setTimeout(() => setActiveNote(null), 420);
  };

  return (
    <div style={{ background:'linear-gradient(160deg,#1a0e07 0%,#2e1a0e 100%)',
      minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:'24px' }}>
      <div className="sheet">
        <div className="header">
          <div className="composer">Franz Joseph Haydn &nbsp;·&nbsp; 1732–1809, Austria</div>
          <h1>Mr. Haydn's Theme</h1>
          <div className="subtitle">G 5-Finger Scale &nbsp;·&nbsp; 3/4 Time &nbsp;·&nbsp; Faber Piano Adventures</div>
        </div>

        <div className="lyric-box">
          <span className={`lyric-text${!lyric ? ' idle' : ''}`}>
            {lyric || 'Press Play to begin…'}
          </span>
        </div>

        <div className="progress-track">
          <div className="progress-fill" style={{ width:`${progress}%` }} />
        </div>

        <div className="tempo-row">
          <span className="tempo-label">Tempo</span>
          <input className="tempo-slider" type="range" min="50" max="160" value={tempo}
            disabled={isPlaying} onChange={e => setTempo(Number(e.target.value))} />
          <span className="tempo-val">♩= {tempo}</span>
        </div>

        <div className="btn-row">
          <button className={`btn-play${isPlaying ? ' playing' : ''}`}
            onClick={() => isPlaying ? reset() : startPlay()}>
            {isPlaying ? '⏹ Stop' : '▶ Play'}
          </button>
          {done && <button className="btn-reset" onClick={reset}>↺ Reset</button>}
        </div>

        <div className="piano-section">
          <div className="piano-label">Tap a key &nbsp;·&nbsp; G · A · B · C · D</div>
          <div className="keys">
            {SCALE_KEYS.map(note => {
              const isLit  = activeNote === note;
              const isWarm = warmNotes.has(note) && !isLit;
              return (
                <div key={note}
                  className={`key${isLit ? ' lit' : isWarm ? ' warm' : ''}`}
                  onClick={() => tapKey(note)}
                  onTouchStart={e => { e.preventDefault(); tapKey(note); }}>
                  {note.replace(/\d/,'')}
                </div>
              );
            })}
          </div>
        </div>

        <div className="footer">✦ From Symphony No. 100, Finale &nbsp;·&nbsp; arranged for piano</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HaydnPlayer />);
</script>
</body>
</html>
